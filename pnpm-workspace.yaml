autoInstallPeers: false
publicHoistPattern:
  - '*storybook*'
# Enforce that packages must be at least 2 days old before they're installed
# This reduces the risk of supply chain attacks from newly published packages
minimumReleaseAge: 2880
packages:
  - 'packages/**'
  - '!**/dist/**'
  - '!**/.next/**'
  - '!packages/haneul/test/**'
  - '!packages/kiosk/test/**'
  - '!packages/codegen/tests/move/**'
  - '!packages/create-dapp/templates/*/move/**'
  - '!packages/haneul/scripts'
  - '!packages/haneul/transactions'
  - '!packages/haneul/cryptography'
  - '!packages/haneul/faucet'
  - '!packages/haneul/client'
  - '!packages/haneul/verify'
  - '!packages/haneul/multisig'
  - '!packages/haneul/utils'
  - '!packages/haneul/bcs'
  - '!packages/enoki/react'
  - '!packages/haneul/graphql'
  - '!packages/haneul/keypairs/ed25519'
  - '!packages/haneul/keypairs/secp256k1'
  - '!packages/haneul/keypairs/secp256r1'
  - '!packages/haneul/graphql/schemas/2024.1'
  - '!packages/haneul/graphql/schemas/2024.4'
  - '!packages/signers/aws'
  - '!packages/signers/gcp'
  - '!packages/signers/ledger'
  - '!packages/haneul/zklogin'
  - '!packages/haneul/keypairs/passkey'
  - '!packages/haneul/graphql/schema'
  - '!packages/signers/utils'
  - '!packages/signers/webcrypto'
  - '!packages/zksend/experimental/unified-adapter'
  - '!packages/haneul/experimental'
  - '!packages/dapp-kit-next/packages/dapp-kit-core/web'
  - '!packages/haneul/grpc'
  - '!packages/haneul/jsonRpc'
